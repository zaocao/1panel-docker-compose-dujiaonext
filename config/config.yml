server:
  host: 0.0.0.0  
  port: 8080  
  mode: release  

log:
  dir: /app/logs
  filename: app.log
  max_size_mb: 100
  max_backups: 14
  max_age_days: 30
  compress: true

jwt:
  secret: "412df024-c5f7-4bdc-9550-4d8d6b09023d"  # 生产环境必须改成自己的
  expire_hours: 24

user_jwt:
  secret: "3d2d0f71-975c-4d06-a663-d09ce6a509c5"  # 生产环境必须改成自己的
  expire_hours: 24 
  remember_me_expire_hours: 168 


# CORS 跨域配置 
cors:
  allowed_origins:
    - "https:/shop.xxx.com"  # 改成自己的user用户前端域名
    - "http://shop.xxx.com"  
    - "https://admin.xxx.com"  # 改成自己的admin管理前端域名
    - "http://admin.xxx.com"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "PATCH"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Origin"
    - "Content-Length"
    - "Content-Type"
    - "Authorization"
    - "X-Requested-With"
    - "Accept"
  allow_credentials: true  # 生产环境必须true 允许 ↑ 前端域名请求api服务携带token凭证
  max_age: 600


# PostgreSQL 配置
# dsn参照格式：host=数据库容器名称 user=数据库用户 password=数据库密码 dbname=数据库名称 port=5432 sslmode=disable TimeZone=Asia/Shanghai
database:
  driver: postgres
  dsn: host=1Panel-postgresql-VIxa user=dujiaonext password=abc123 dbname=dujiaonext port=5432 sslmode=disable TimeZone=Asia/Shanghai
  pool:
    max_open_conns: 50
    max_idle_conns: 10
    conn_max_lifetime_seconds: 1800
    conn_max_idle_time_seconds: 600

# Redis 配置
redis:
  enabled: true
  host: redis  # Redis容器名称
  port: 6379
  password: abc123  # Redis密码
  db: 0   # 默认使用Redis数据库 如果你别的项目在用0  这里你可以改成其他值
  prefix: "dj"

# 队列配置 
queue:
  enabled: true
  host: redis   # Redis容器名称
  port: 6379
  password: abc123   # Redis密码
  db: 1   # 默认使用的Redis数据库 如果你别的项目在用1  这里你可以改成其他值
  concurrency: 10
  queues:
    default: 10
    critical: 5